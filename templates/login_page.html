{% extends "layout_all_page.html" %}
{% block content%}
<div class="body-container">
  <section class="auth-container">
    <h2 class="auth-title">Login</h2>

    <form class="js-login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="text"
          class="form-input js-login-email"
          placeholder="Enter your email"
          name="username"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-input js-login-password"
          placeholder="Enter your password"
          name="password"
          required
        />
      </div>

      <button type="submit" class="form-button">
        Login
      </button>
    </form>

    <p class="success-message js-login-message"></p>
  </section>
  </div>
  <script src="{{url_for("static", path="script/login.js")}}", type="module"></script>
{% endblock content %}
