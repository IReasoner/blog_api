{% extends "layout_page.html" %}
{% block content %}
  <div class="reset-password-page">

    <div class="reset-password-card">

        <h1 class="reset-password-title">

            Reset Password

        </h1>

        <p class="reset-password-description">
            Enter your new password below.
        </p>

        <form class="reset-password-form js-reset-password-form">


            <!-- PASSWORD -->

            <div class="reset-form-group">

                <label>
                    New Password
                </label>

                <div class="password-wrapper">

                    <input
                        type="password"
                        class="reset-input js-password"
                        placeholder="Enter new password"
                        required
                    >

                    <button
                        type="button"
                        class="password-toggle js-password-toggle">
                        Show
                    </button>

                </div>

            </div>

            <!-- CONFIRM PASSWORD -->

            <div class="reset-form-group">

                <label>
                    Confirm Password
                </label>

                <div class="password-wrapper">
                    <input
                        type="password"
                        class="reset-input js-confirm-password"
                        placeholder="Confirm password"
                        name="confirm-password"
                        required
                    >
                </div>

            </div>
            <p class="password-error js-password-error">

            </p>

            <button
                type="submit"
                class="reset-submit-button js-reset-button"
                disabled>
                Reset Password
            </button>
        </form>
    </div>
  </div>
{% endblock content %}

{% block scripts %}
  <script src="{{url_for('static', path='script/reset_password.js')}}"></script>
{% endblock scripts %}
