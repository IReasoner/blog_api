{% extends "layout_page.html" %}
{% block content %}
<div class="forgot-password-page">

    <div class="forgot-password-card">

        <h1 class="forgot-password-title">
            Forgot Password?
        </h1>

        <p class="forgot-password-description">
            Enter your email address and we'll send you a password reset link.
        </p>

        <form class="forgot-password-form js-forgot-password">

            <div class="forgot-form-group">

                <label class="forgot-label">
                    Email Address
                </label>

                <input
                    type="email"
                    class="forgot-input js-forgot-email"
                    placeholder="Enter your email"
                    name="email"
                    required
                >

            </div>

            <button
                type="submit"
                class="forgot-submit-button">
                Send Reset Link
            </button>

        </form>
        <a
            href="{{url_for('load_login_page')}}"
            class="forgot-back-link">
            Back to Login
        </a>
    </div>
  </div>
{% endblock content %}

{% block scripts %}
  <script>
   const form = document.querySelector(".js-forgot-password")

   form.addEventListener("submit", async (e) => {
        e.preventDefault()

        const formData = new FormData(form)

        try {

          const response = await fetch("/api/users/forgot_password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: formData.get("email")
            })
          })

          if (!response.ok) {
            return
          }

          const data = await response.json()
          alert(data.message)

          document.querySelector(".js-forgot-email").value = "";
          
        } catch(error) {
            console.log(error)
            console.log("Something went wrong")
        }
   })

  </script>
{% endblock scripts %}
