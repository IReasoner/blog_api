{% extends "layout_all_page.html" %}
{% block content%}
<div class="body-container">
  <section class="auth-container">
    <h2 class="auth-title">Register</h2>

    <form class="js-register-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input
          type="text"
          class="form-input js-register-username"
          placeholder="Enter your username"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-input js-register-email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-input js-register-password"
          placeholder="Create password"
          required
        />
      </div>

      <button type="submit" class="form-button">
        Register
      </button>
    </form>

    <p class="success-message js-register-message"></p>
  </section>
  
  </div>

  <script src="{{url_for("static", path="script/register.js")}}", type="module"></script>
{% endblock content %}
